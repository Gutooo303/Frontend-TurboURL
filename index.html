<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboURL | Encurtador de URL</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="brand">
            Turbo<span>URL</span>
        </a>

        <div id="nav-actions"></div>
    </nav>

    <main class="container hero">

        <h1 class="hero-title animate">
            Seus links com
            <span>superpoderes</span>.
        </h1>

        <p class="hero-subtitle animate">
            A plataforma moderna para encurtar, gerenciar e proteger suas URLs.
        </p>

        <div class="hero-form">
            <div class="card hero-card animate">

                <input type="url" name="url" placeholder="Sua URL longa aqui..." class="form-control">

                <a href="register.html" class="btn btn-primary">
                    Começar Agora
                </a>

            </div>
        </div>

    </main>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>

</body>

</html>
