<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | TurboURL</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="brand">Turbo<span>URL</span></a>
        <div id="nav-actions"></div>
    </nav>
    
    <main class="auth-container">
        <div class="card auth-card animate">
            <h2>Configurações</h2>
            <form id="profile-form" onsubmit="Pages.updateProfile(event)">
                <div>
                    <label>Nome</label>
                    <input type="text" name="name" class="form-control">
                </div>
                <div>
                    <label>E-mail</label>
                    <input type="email" name="email" class="form-control">
                </div>
                <div>
                    <label>Nova Senha (opcional)</label>
                    <input type="password" name="password" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Salvar Alterações</button>
            </form>
            <hr class="form-divider">
            <button onclick="Pages.deleteAccount()" class="btn btn-danger btn-full">Excluir Conta Permanentemente</button>
        </div>
    </main>
    
    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
</body>

</html>
