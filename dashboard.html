<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TurboURL</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="brand">Turbo<span>URL</span></a>
        <div id="nav-actions"></div>
    </nav>
    
    <main class="container dashboard-container">
        <h2 id="user-welcome">Olá!</h2>
        
        <div class="card">
            <h3>Novo Link</h3>
            <form onsubmit="Pages.shorten(event)" class="dashboard-form">
                <input type="url" name="url" placeholder="Sua URL longa aqui..." class="form-control" required>
                <select name="expiresIn" class="form-control">
                    <option value="1h">1 Hora</option>
                    <option value="6h">6 Horas</option>
                    <option value="12h">12 Horas</option>
                    <option value="1d">1 Dia</option>
                </select>
                <button type="submit" class="btn btn-primary">Encurtar</button>
            </form>
        </div>
        
        <h3>Seus Links</h3>
        <div id="links-list"></div>
        
        <div class="dashboard-footer">
            <a href="profile.html" class="btn btn-outline">Configurações de Conta</a>
        </div>
    </main>
    
    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
</body>

</html>
